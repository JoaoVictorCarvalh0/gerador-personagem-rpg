services:
  web:
    build:
      context: ./web
    expose:
      - "80"
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: ./backend/api
    volumes:
      - avatars:/app/avatars
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URL=mongodb://mongo:27017/rpg
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy

  worker:
    build:
      context: ./backend/worker
    deploy:
      replicas: 3
    volumes:
      - avatars:/app/avatars
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URL=mongodb://mongo:27017/rpg
      - POLLINATIONS_TOKEN=${POLLINATIONS_TOKEN:-}
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  avatars:
  redis_data:
  mongo_data:
