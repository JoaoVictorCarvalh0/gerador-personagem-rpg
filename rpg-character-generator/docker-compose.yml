services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rpg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rpgpassword}
      POSTGRES_DB: ${POSTGRES_DB:-rpgdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rpg} -d ${POSTGRES_DB:-rpgdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./api
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - "5000:5000"
    volumes:
      - avatars:/avatars
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: python app.py

  worker:
    build:
      context: ./worker
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://${POSTGRES_USER:-rpg}:${POSTGRES_PASSWORD:-rpgpassword}@postgres:5432/${POSTGRES_DB:-rpgdb}
      AVATAR_DIR: /avatars
      C_FORCE_ROOT: "true"
    volumes:
      - avatars:/avatars
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A tasks worker --loglevel=info --concurrency=2

volumes:
  redis_data:
  postgres_data:
  avatars:
